<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>News</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      background: transparent;
      font-family: "Segoe UI", Arial, sans-serif;
    }
    .timeline {
      position: relative;
      padding: 4px 0 4px 32px;
      margin: 0;
    }
    .timeline::before {
      content: "";
      position: absolute;
      left: 9px;
      top: 12px;
      bottom: 12px;
      width: 2px;
      background: #c8d6e5;
      border-radius: 1px;
    }
    .timeline-item {
      position: relative;
      padding: 0 0 14px 20px;
    }
    .timeline-item:last-child {
      padding-bottom: 0;
    }
    .timeline-item::before {
      content: "◆";
      position: absolute;
      left: -32px;
      top: 2px;
      width: 16px;
      height: 16px;
      font-size: 14px;
      line-height: 16px;
      text-align: center;
      color: #6a9ed5;
      background: none;
      border: none;
      box-shadow: none;
    }
    .timeline-item:first-child::before {
      color: #1a4fa0;
    }
    .timeline-date {
      font-size: 0.88rem;
      color: #7a8a9e;
      font-weight: 500;
      margin-bottom: 3px;
    }
    .timeline-text {
      font-size: 1rem;
      color: #1f2d3d;
      line-height: 1.5;
    }
    @media (max-width: 600px) {
      .timeline {
        padding-left: 26px;
      }
      .timeline-item {
        padding-left: 14px;
      }
      .timeline-item::before {
        left: -20px;
      }
    }
  </style>
</head>
<body>
  <div class="timeline">
    <div class="timeline-item">
      <div class="timeline-date">Feb 21, 2026</div>
      <div class="timeline-text">🎉 AffordGrasp has been accepted to <b>CVPR 2026</b>.</div>
    </div>
    <div class="timeline-item">
      <div class="timeline-date">Sep 19, 2025</div>
      <div class="timeline-text">🎉 FreqPolicy has been accepted to <b>NeurIPS 2025</b>.</div>
    </div>
    <div class="timeline-item">
      <div class="timeline-date">Jun 26, 2025</div>
      <div class="timeline-text">🎉 DexH2R has been accepted to <b>ICCV 2025</b>.</div>
    </div>
    <div class="timeline-item">
      <div class="timeline-date">Feb 27, 2025</div>
      <div class="timeline-text">🎉 EasyHOI has been accepted to <b>CVPR 2025</b>.</div>
    </div>
  </div>
</body>
</html>
